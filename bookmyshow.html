<!DOCTYPE html>
<html>
<head>
    <title>BookMyShow Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #ffffff;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #d81f26;
        }
        .search input {
            width: 500px;
            padding: 10px;
        }
        .nav-right button {
            padding: 8px 15px;
            background-color: #d81f26;
            color: white;
            border: none;
        }
        .menu {
            display: flex;
            justify-content: space-between;
            background-color: #ececec;
            padding: 12px 40px;
        }
        .left-menu,
        .right-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .banner {
            height: 300px;
            background-color: #d81f26;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .section {
            padding: 30px 40px;
        }
        .section h2 {
            margin-bottom: 20px;
        }
        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            gap: 20px;
        }
        .movie-card {
            width: 200px;
            background-color: white;
            padding: 10px;
        }
        .movie-image {
            height: 250px;
            background-color: #cfcfcf;
            margin-bottom: 10px;
        }
        .movie-card h3 {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            BookMyShow
        </div>
        <div class="search">
            <input type="text" placeholder="Search Movies, Events, Sports">
        </div>
        <div class="nav-right">
            <button>Sign In</button>
        </div>
    </div>
    <div class="menu">
        <ul class="left-menu">
            <li>Movies</li>
            <li>Stream</li>
            <li>Events</li>
            <li>Plays</li>
            <li>Sports</li>
        </ul>
        <ul class="right-menu">
            <li>Offers</li>
            <li>Gift Cards</li>
        </ul>
    </div>
    <div class="banner">
        <h1>Welcome to BookMyShow</h1>
    </div>
    <div class="section">
        <h2>Recommended Movies</h2>
        <div class="movie-container">
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Movie 1</h3>
                <p>Action</p>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Movie 2</h3>
                <p>Comedy</p>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Movie 3</h3>
                <p>Drama</p>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Movie 4</h3>
                <p>Thriller</p>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Movie 5</h3>
                <p>Adventure</p>
            </div>
        </div>
    </div>
    <div class="section">
        <h2>Events Near You</h2>
        <div class="movie-container">
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Music Show</h3>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Standup Comedy</h3>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Live Concert</h3>
            </div>
            <div class="movie-card">
                <div class="movie-image"></div>
                <h3>Sports Event</h3>
            </div>
        </div>
    </div>
</body>
</html>

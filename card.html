<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Card</title>
    <style>
        *{
            background-color: rgb(181, 176, 176);
        }
        p{
            background-color: white;
        }
        .outerbox{
            height: 500px;
            width: 300px;
            display: flex;
            flex-direction: column;
            /* margin-top: 90px;
            margin-left: 40%;
            margin-right: 50%; */
        }
        .inupper{
            width: 100%;
            height: 200px;
            background-color: blue;
            display: flex;
            justify-content: center;
            align-items:end ;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .photo{
            height: 150px;
            width: 150px;
            border-radius: 50%;
            background-color: orange;
            position: relative;
            top: 20px;
            border: 2px solid blue;
            background-image: url("image.png");
            background-size: cover;
            
        }
        .inlower{
            width: 100%;
            height: 700px;
            background-color: rgb(254, 254, 254);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }
        .details{
            height: 80px;
            width: 50%;
            background-color: rgb(255, 255, 255);
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .name{
            background-color: white;
        }
        .pfs{
            background-color: white;
        }
        .socialmedia{
            height: 30px;
            width: 60%;
            background-color: white;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        .fb{
            height: 30px;
            width:  30px;
            border-radius: 50%;
            background-image: url(fb.png);
            background-size: cover;
        }
        .x{
           height: 30px;
            width: 30px;
            border-radius: 50%;
            background-image: url(twitter.png);
            background-size: cover;  
        }

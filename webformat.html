<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        *{
            background-color: black;
        }
       .header{
            width: 100% ;
            height: 50px ;
            text-align: center;
            background-color: rgb(182, 34, 34);
            border: 3px solid rgb(244, 121, 121);
            justify-content: center;
            align-items: center;
        }
        .navbar{
            width: 100%;
            height: 50px;
            background-color: darkgoldenrod;
            border: 3px solid rgb(255, 196, 46);
            margin-top: 10px;
            text-align: center;
        } 
        .middle{
            display: flex;
           
        }
        .main{
            margin-top: 10px;
            width: 60%;
            height: 500px;
            background-color: rgb(19, 78, 112);
            display: flex;
            border: 3px solid rgb(142, 210, 255);
        }
        .article{
            width: 50%;
            height: 450px;
            background-color: skyblue;
            border: 3px solid rgb(26, 0, 110);
            margin: 10px;
            text-align: center;
            
        }
        .aside{
            width: 40%;
            height: 500px;
            background-color: green;
            border: 3px solid rgb(0, 255, 0);
            margin: 10px;
            text-align: center;
        }
        .footer{
            width: 100%;
            height: 100px;
            background-color: rgb(183, 25, 25);
            border: 3px solid rgb(255, 91, 91);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        Header
     </div>
     <div class="navbar">
        Navbar
     </div>
     <div class="middle">
     <div class="main">
        <div class="article">Article</div>
        <div class="article">Section</div>

     </div>
     <div class="aside">Aside</div>
     </div>
     <div class="footer">Footer</div>
</body>
</html>
